<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — WVVYphone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page:    #0f1117;
      --bg-card:    #1c1e28;
      --bg-overlay: #22253a;
      --bg-hover:   #2a2d3e;
      --border-subtle:  rgba(255,255,255,0.04);
      --border-default: rgba(255,255,255,0.10);
      --cyan:       #00e8c8;
      --cyan-glow:  rgba(0,232,200,0.20);
      --cyan-ghost: rgba(0,232,200,0.10);
      --violet:     #8b5cf6;
      --text-primary:   #eeeef5;
      --text-secondary: #9899b0;
      --text-tertiary:  #5a5b72;
      --rose:       #fb7185;
      --rose-ghost: rgba(251,113,133,0.10);
      --rose-border: rgba(251,113,133,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', -apple-system, sans-serif;
      background-color: var(--bg-page);
      color: var(--text-secondary);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;

      /* Dot grid */
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1.5px, transparent 1.5px);
      background-size: 28px 28px;
    }

    /* Vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 100% 80% at 50% 50%, transparent 30%, rgba(15,17,23,0.7) 100%);
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 50% 40% at 20% 20%, rgba(0,232,200,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 80% 80%, rgba(139,92,246,0.07) 0%, transparent 60%);
    }

    .blurred-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      filter: blur(12px);
      transform: scale(1.06);
      pointer-events: none;
      user-select: none;
      opacity: 0.35;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: rgba(15,17,23,0.65);
    }

    .login-wrap {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--bg-overlay);
      border: 1px solid var(--border-default);
      border-radius: 1.25rem;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.6),
        0 0 0 1px var(--border-subtle),
        inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
      text-align: center;
    }

    /* Cyan-violet top accent */
    .login-card-accent {
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--cyan) 40%, var(--violet) 70%, transparent 100%);
      opacity: 0.65;
    }

    .login-card-body {
      padding: 2.25rem 2rem 2rem;
    }

    .login-logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 0.375rem;
    }
    .login-logo .accent { color: var(--cyan); text-shadow: 0 0 24px var(--cyan-glow); }

    .login-subtitle {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }

    .error-box {
      margin-bottom: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 0.625rem;
      background: var(--rose-ghost);
      border: 1px solid var(--rose-border);
      color: var(--rose);
      font-size: 0.8125rem;
      text-align: left;
      line-height: 1.5;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      background: rgba(255,255,255,0.95);
      color: #1a1a2e;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: 0.01em;
      padding: 0.75rem 1.25rem;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 120ms ease, box-shadow 120ms ease, transform 120ms ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .google-btn:hover {
      background: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transform: translateY(-1px);
    }
    .google-btn:active {
      transform: scale(0.98);
    }

    .login-footer {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      margin-top: 1.5rem;
      letter-spacing: 0.04em;
    }

    /* Fake app chrome for blurred bg */
    .fake-nav {
      background: rgba(22,24,32,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .fake-pill {
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
    }
    .fake-card {
      background: rgba(28,30,40,0.9);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem;
    }
    .fake-bar {
      height: 9px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
    }
    .fake-row {
      height: 38px;
      background: rgba(22,24,32,0.9);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- Blurred fake-app background -->
  <div class="blurred-bg">
    <div class="fake-nav">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:1.1rem;font-weight:800;color:#00e8c8;">WVVY<span style="color:#eeeef5;">phone</span></div>
      </div>
      <div style="display:flex;gap:16px">
        <div class="fake-pill" style="width:64px;"></div>
        <div class="fake-pill" style="width:48px;"></div>
        <div class="fake-pill" style="width:40px;"></div>
      </div>
    </div>
    <div style="padding:1.25rem 1.5rem;display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:12px">
      {% for _ in "12345" %}
      <div class="fake-card">
        <div class="fake-bar" style="width:60%;margin-bottom:10px;"></div>
        <div class="fake-bar" style="width:40%;height:18px;background:rgba(0,232,200,0.12);"></div>
      </div>
      {% endfor %}
    </div>
    <div style="padding:0 1.5rem;display:flex;flex-direction:column;gap:8px">
      <div class="fake-row"></div>
      {% for _ in "12345" %}
      <div class="fake-row" style="opacity:{{ forloop.counter|add:3 }}0%;"></div>
      {% endfor %}
    </div>
  </div>

  <!-- Overlay -->
  <div class="bg-overlay"></div>

  <!-- Login card -->
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-card-accent"></div>
      <div class="login-card-body">

        <div class="login-logo">
          <span class="accent">WVVY</span><span style="color:var(--text-primary);">phone</span>
        </div>
        <p class="login-subtitle">Sign in to access your CRM</p>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <a href="/auth/google/" class="google-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </a>

        <p class="login-footer">Access is by invitation only</p>
      </div>
    </div>
  </div>

</body>
</html>
